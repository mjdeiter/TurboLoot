;     Loot, Sell, Keep, Bank, Tribute, Ignore, #, Destroy
;-------------------------------------------------------------------------------->
;   • Press CTRL+F to find any item or categoryand change based on your preference
;-------------------------------------------------------------------------------->
; TurboLoot.ini — STARTER TEMPLATE (minimal)
; Full sample with many items: "Example TurboLoot.ini" in the same folder/repo.
; Docs: https://github.com/drel-git/TurboLoot  |  /mac TurboLoot help in game
; ================================================================================
;
[-]
; --Core--
lootRadiusFeet=100
inventoryWarnSlots=5
debug=OFF
logToFile=OFF
; logLevel: DEBUG, INFO, WARN, or ERROR (when logToFile=ON). Uncomment to set:
; logLevel=INFO

; --Looting & selling rules--
lootHighValueMinPP=50
lootStackableMinPP=50
sellUnlistedStackable=OFF
sellUnlistedItems=OFF
sellWildcards=OFF
bankWildcards=ON
StopLootWhenAttacked=OFF
returnToLeader=ON
dropLevBeforeNav=OFF
; OFF = reliable default. ON = faster / more aggressive corpse timing.
FastLootMode=OFF

; --Announcements--
announceDefaultTo=e3bc
announceDoneLootingTo=e3bc
announceSkipTo=gsay
announceBankSellPerItem=ON
announceLoot=ON
announceDestroy=ON
announceRunSummary=ON
autoRsayInRaid=OFF

; --Advanced--
corpseHideMode=LOOTED
lootNoDropPrompt=never
lootNoDropPromptReset=always

; ------------------------------------------------------------------------------
; TurboGive: optional [GiveList] — who gets which items / patterns.
; See TurboGive Getting Started.md. Remove this section if you only use TurboLoot.
; ------------------------------------------------------------------------------
[GiveList]
; Exact lines:   Item Exact Name=ReceiverCharName
; Patterns:      _prefix1=Receiver:Spell:*   _prefix2=Receiver:*Ore
; Shared rules:  _wildcards=CharName|OtherChar   (uses [Wildcards] for matching)
;ExampleItem=YourTankName
;_prefix1=YourTank:Spell:*
;_wildcards=YourTank

[Wildcards]
; Looting = prefix (starts-with) only. ON/OFF for built-ins; Wildcard1= for customs.
; GiveList _prefix can use Text*  *Text  *Text* — see TurboGive docs.
Spell:=ON
Skill:=ON
Song:=ON
Tome =ON
Tome of =ON
;Wildcard1=Rune of 

[ItemLimits]
; Rules: KEEP, SELL, BANK, TRIBUTE, DESTROY, IGNORE, SKIP, ALL, or a number (max count).
; /mac TurboKey RULE with item on cursor adds a line here.
; /mac TurboLoot help  — full commands

;Bone Chips=IGNORE
